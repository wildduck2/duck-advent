# duck-advent tmux runtime config.
# Loaded into the per-session config via -f when the orchestrator spawns tmux.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -sg escape-time 0
set -g status-keys vi
set -g mode-keys vi
set -g history-limit 50000

set -g status on
set -g status-position top
set -g status-interval 2
set -g status-left-length 60
set -g status-right-length 120
set -g status-style "bg=default,fg=default"

# A space at the start so the bar isn't flush with the cell edge.
set -g status-left " #[fg=cyan,bold]duck-quest #[fg=default]· #(cat #{pane_current_path}/.gentleduck/runtime-status 2>/dev/null || echo '...') "
set -g status-right "#[fg=yellow]#{?client_prefix,⌘,}#[default] %H:%M "

# Pane styling
set -g pane-border-style "fg=#3a3a3a"
set -g pane-active-border-style "fg=cyan"
set -g status-justify centre

# Smarter pane switching (no prefix needed)
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-j select-pane -D
bind -n M-k select-pane -U

# Pane resize
bind -n M-H resize-pane -L 5
bind -n M-L resize-pane -R 5
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2

# Even split
bind = select-layout main-vertical
